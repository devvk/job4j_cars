<div th:fragment="navigation">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">

            <a class="navbar-brand" href="/">Cars</a>

            <div class="navbar-nav">
                <a class="nav-link"
                   th:classappend="${filter == null || filter == 'all'} ? ' active'"
                   th:href="@{/posts}">
                    Все объявления
                </a>
                <a class="nav-link"
                   th:classappend="${filter == 'today'} ? ' active'"
                   th:href="@{/posts(filter='today')}">
                    За сегодня
                </a>
                <a class="nav-link"
                   th:classappend="${filter == 'with-photo'} ? ' active'"
                   th:href="@{/posts(filter='with-photo')}">
                    С фото
                </a>
            </div>

            <div class="navbar-nav ms-auto" th:if="${session.user == null}">
                <a class="nav-link" href="/users/login">Войти</a>
                <a class="nav-link" href="/users/register">Регистрация</a>
            </div>

            <div class="navbar-nav ms-auto" th:if="${session.user != null}">
                <form th:action="@{/users/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-link nav-link px-0">
                        Выйти
                    </button>
                </form>
            </div>

        </div>
    </nav>
</div>
